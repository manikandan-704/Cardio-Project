server:
  port: 8081

spring:
  application:
    name: UserService

  datasource:
    url: jdbc:postgresql://localhost:5432/fitness_user_db
    username: postgres
    password: mani
    driver-class-name: org.postgresql.Driver # Good practice to include

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        # Fixed the typo: PostgreSQLDialect (not PostgresSQLDialect)
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true # Optional: helpful for debugging

    eureka:
      client:
        serviceUrl:
          defaultZone: http://localhost:8761/eureka/
